---
- name: "Load os-specific variables"
  ansible.builtin.include_vars: "{{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_version'] }}.yml"

- name: "Install PostgreSQL"
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: "present"
  vars:
    packages:
      - 'acl'
      - "postgresql"
      - "libpq-dev"
      - 'postgis'
      - 'python3-psycopg2'

- name: "Configure network listener"
  ansible.builtin.lineinfile:
    path: "{{ postgresql_config_path }}/postgresql.conf"
    regexp: "listen_addresses"
    line: "listen_addresses = '*'     # what IP address(es) to listen on;"
  notify: "postgresql_restart"

- name: "Configure the firewall (postgres)"
  community.general.ufw:
    rule: "allow"
    port: "postgres"

- name: 'Copy keys for backup user'
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "/root/.ssh/{{ item.name }}"
    mode: '0600'
  no_log: "yes"
  loop:
    - { content: "{{ postgresql_backup.id_rsa.private }}", name: "{{ postgresql_backup.user }}" }
    - { content: "{{ postgresql_backup.id_rsa.public  }}", name: "{{ postgresql_backup.user }}.pub" }
  when: 'postgresql_backup.user is defined'

- name: "Create backup directory"
  ansible.builtin.file:
    path: "/srv/backups/postgres"
    state: "directory"
    group: "staff"
    mode:  "u=rwX,g=rwXs,o=rX"

- name: "Install cron backup script"
  ansible.builtin.template:
    src: "backup.sh"
    dest: "/etc/cron.daily/backup.d/postgres"
    mode: "0755"
...
